<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>fk3 Pädagogische Planungshilfe</title>
<style>
:root{
  --clr-accent-light:#69A3D2;--clr-accent-dark:#103354;--clr-bg:#ffffff;--clr-text:#1a1a1a;
  --clr-text-muted:#5a6370;--clr-border:#d0d5dd;--clr-surface:#f4f7fa;--clr-surface-hover:#e8edf3;
  --clr-success:#2e7d4f;--clr-success-light:#eef7f1;--clr-danger:#c0392b;--clr-white:#ffffff;
  --clr-fertig-bg:#eef7f1;--clr-fertig-bg-hover:#ddf0e3;--clr-keine-infos-bg:#e8e8e8;--clr-keine-infos-bg-hover:#dcdcdc;
  --radius:8px;--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);
  --transition:0.2s ease;--max-width:1200px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--clr-text);background:var(--clr-bg);line-height:1.6;padding:24px 16px 80px}
.app-container{max-width:var(--max-width);margin:0 auto}

.abschnitt{border:1px solid var(--clr-border);border-radius:var(--radius);margin-bottom:16px;background:var(--clr-white)}
.abschnitt-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;cursor:pointer;user-select:none;gap:12px;min-height:56px}
.abschnitt-header:hover{background:var(--clr-surface)}
.abschnitt.nicht-klappbar .abschnitt-header{cursor:default}
.abschnitt.nicht-klappbar .abschnitt-header:hover{background:transparent}
.abschnitt-titel{font-size:1.6rem;font-weight:700;color:var(--clr-accent-dark);letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.abschnitt-titel .chevron{font-size:.7rem;color:var(--clr-text-muted);transition:transform var(--transition)}
.abschnitt.offen .abschnitt-titel .chevron{transform:rotate(90deg)}
.abschnitt-inhalt{padding:0 24px 24px;display:none}
.abschnitt.offen .abschnitt-inhalt{display:block}
.abschnitt-header-rechts{display:flex;align-items:center;gap:12px;flex-shrink:0}
.fortschritt{font-size:.75rem;color:var(--clr-text-muted);white-space:nowrap;background:var(--clr-surface);padding:4px 10px;border-radius:12px}
.fortschritt strong{color:var(--clr-accent-dark)}
.fortschritt-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.f-badge{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap}
.f-badge-gruen{background:var(--clr-success-light);color:var(--clr-success)}
.f-badge-grau{background:var(--clr-keine-infos-bg);color:#666}
.f-badge-fertig{background:var(--clr-success);color:var(--clr-white)}
.abschnitt.abschnitt-fertig-bg{background:var(--clr-fertig-bg);border-color:#a8d5b8}
.abschnitt.abschnitt-fertig-bg .abschnitt-titel{color:var(--clr-success)}
.abschnitt.abschnitt-fertig-bg .abschnitt-header:hover{background:var(--clr-fertig-bg-hover)}

.bereich{border:1px solid var(--clr-border);border-radius:var(--radius);margin-bottom:10px;background:var(--clr-white);overflow:hidden;transition:background var(--transition),border-color var(--transition)}
.bereich-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:8px;min-height:42px}
.bereich-titel{font-size:1.05rem;font-weight:700;color:var(--clr-accent-dark);transition:color var(--transition)}
.bereich-inhalt{padding:0 16px 14px}
.bereich.eingeklappt .bereich-inhalt{display:none}
.bereich.eingeklappt .bereich-header{cursor:pointer}
.bereich.eingeklappt .bereich-header:hover{background:var(--clr-surface)}
.bereich.fertig-bg{background:var(--clr-fertig-bg);border-color:#a8d5b8}
.bereich.fertig-bg .bereich-titel{color:var(--clr-success)}
.bereich.fertig-bg.eingeklappt .bereich-header:hover{background:var(--clr-fertig-bg-hover)}
.bereich.fertig-bg.eingeklappt:hover .btn--fertig-badge{background:#256b40;border-color:#256b40}
.bereich.keine-infos-bg{background:var(--clr-keine-infos-bg);border-color:#ccc}
.bereich.keine-infos-bg .bereich-titel{color:#666}
.bereich.keine-infos-bg.eingeklappt .bereich-header:hover{background:var(--clr-keine-infos-bg-hover)}
.bereich.keine-infos-bg.eingeklappt:hover .btn--keine-infos-badge{background:#c8c8c8;color:#444}
/* Collapsed bereich with toggle: hover triggers first toggle option */
.bereich.eingeklappt:not(.fertig-bg):not(.keine-infos-bg) .bereich-header:hover .toggle-option:first-child{background:var(--clr-surface-hover)}

.a1-bereich-titel{font-size:1.05rem;font-weight:700;color:var(--clr-accent-dark);margin:16px 0 6px;display:flex;align-items:center;gap:8px}
.a1-bereich-titel:first-child{margin-top:0}
.stichpunkt-badge{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.stichpunkt-badge.grau{background:var(--clr-keine-infos-bg);color:#666}
.stichpunkt-badge.gruen{background:var(--clr-success-light);color:var(--clr-success)}

.feld{margin-bottom:10px}
.feld:last-child{margin-bottom:0}
.feld-label{display:block;font-size:.82rem;font-weight:600;color:var(--clr-accent-dark);margin-bottom:4px;line-height:1.4;white-space:pre-line}
.feld-label-inline{display:flex;gap:2em;flex-wrap:wrap;font-size:.82rem;font-weight:600;color:var(--clr-accent-dark);margin-bottom:4px;line-height:1.4}
.feld-label-inline span{white-space:nowrap}
.feld-input,.feld-textarea{width:100%;padding:10px 12px;font-size:.88rem;border:1px solid var(--clr-border);border-radius:var(--radius);background:var(--clr-white);color:var(--clr-text);transition:border-color var(--transition),box-shadow var(--transition),background var(--transition),color var(--transition);font-family:inherit;line-height:1.5}
.feld-input:focus,.feld-textarea:focus{outline:none;border-color:var(--clr-accent-light);box-shadow:0 0 0 3px rgba(105,163,210,.2)}
.feld-textarea{resize:vertical;min-height:65px;height:65px;overflow:hidden}
.feld-textarea.ta-fertig{background:var(--clr-fertig-bg);border-color:#a8d5b8;color:var(--clr-success)}
.feld-textarea.ta-keine-infos{background:var(--clr-keine-infos-bg);border-color:#bbb;color:#888}
.feld-input::placeholder,.feld-textarea::placeholder{color:#aab0b8;font-size:.84rem}
.feld-row{display:flex;gap:12px;flex-wrap:wrap}
.feld-row>.feld{flex:1;min-width:150px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;font-size:.85rem;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;transition:all var(--transition);font-family:inherit;text-align:center;min-width:120px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn--primary{background:var(--clr-accent-dark);color:var(--clr-white)}
.btn--primary:hover:not(:disabled){background:#1a4a72}
.btn--secondary{background:var(--clr-surface);color:var(--clr-accent-dark);border:1px solid var(--clr-border)}
.btn--secondary:hover:not(:disabled){background:var(--clr-surface-hover)}
.btn--small{padding:7px 14px;font-size:.8rem;min-width:150px}
.btn--danger-outline{background:none;border:1px solid var(--clr-border);color:var(--clr-text-muted);padding:6px 14px;font-size:.8rem;min-width:120px}
.btn--danger-outline:hover:not(:disabled){border-color:var(--clr-danger);color:var(--clr-danger)}
.btn--fertig{background:var(--clr-success);color:var(--clr-white);padding:6px 14px;font-size:.8rem}
.btn--fertig:hover:not(:disabled){background:#256b40}
.btn--keine-infos{background:var(--clr-keine-infos-bg);border:1px solid #ccc;color:#666;padding:6px 14px;font-size:.8rem;min-width:120px}
.btn--keine-infos:hover:not(:disabled){background:var(--clr-keine-infos-bg-hover);border-color:#aaa;color:#444}
.bereich-footer-buttons{display:flex;gap:8px;margin-top:14px;align-items:center}
.abschnitt-footer{display:flex;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--clr-border)}

.toggle-wrapper{display:inline-flex;align-items:stretch;border-radius:var(--radius);overflow:hidden;border:2px solid var(--clr-border)}
.toggle-option{padding:5px 14px;text-align:center;font-size:.78rem;font-weight:600;cursor:pointer;background:var(--clr-white);color:var(--clr-text-muted);transition:all var(--transition);border:none;font-family:inherit;line-height:1.4;white-space:nowrap}
.toggle-option.active{background:var(--clr-accent-dark);color:var(--clr-white)}
.toggle-option:hover:not(.active){background:var(--clr-surface-hover)}

.btn--fertig-badge{width:110px;padding:5px 0;font-size:.78rem;font-weight:700;border:2px solid var(--clr-success);border-radius:var(--radius);cursor:pointer;background:var(--clr-success);color:var(--clr-white);font-family:inherit;transition:all var(--transition);white-space:nowrap;text-align:center}
.btn--fertig-badge:hover{background:#256b40;border-color:#256b40}

.btn--keine-infos-badge{width:110px;padding:5px 0;font-size:.78rem;font-weight:700;border:2px solid #bbb;border-radius:var(--radius);cursor:pointer;background:#e0e0e0;color:#666;font-family:inherit;transition:all var(--transition);white-space:nowrap;text-align:center}
.btn--keine-infos-badge:hover{background:#c8c8c8;border-color:#999;color:#444}

.lueckentext{font-size:.88rem;line-height:2.2;color:var(--clr-text)}
.lueckentext-satz{margin-bottom:2px;display:flex;flex-wrap:wrap;align-items:baseline;gap:0}
.lueckentext-satz span{white-space:pre-wrap}
.luecke-dropdown{padding:4px 8px;font-size:.85rem;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-weight:600;border:1px solid var(--clr-accent-light);border-radius:4px;background:var(--clr-white);color:var(--clr-accent-dark);cursor:pointer;margin:0 2px;vertical-align:baseline}
.luecke-dropdown option{font-size:.85rem;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-weight:600}
.luecke-dropdown:focus{outline:none;box-shadow:0 0 0 2px rgba(105,163,210,.3)}
.luecke-freitext-wrapper{display:inline-flex;align-items:center;gap:0;margin:0 2px;vertical-align:baseline}
.luecke-freitext{padding:4px 8px;font-size:.85rem;border:1px solid var(--clr-accent-light);border-radius:4px 0 0 4px;background:var(--clr-white);color:var(--clr-accent-dark);font-family:inherit;font-weight:600;min-width:120px;max-width:240px}
.luecke-freitext:focus{outline:none;box-shadow:0 0 0 2px rgba(105,163,210,.3)}
.luecke-close{padding:4px 8px;font-size:.78rem;border:1px solid var(--clr-accent-light);border-left:none;border-radius:0 4px 4px 0;background:var(--clr-surface);color:var(--clr-text-muted);cursor:pointer;font-family:inherit;line-height:1}
.luecke-close:hover{background:var(--clr-surface-hover);color:var(--clr-danger)}
.lueckentext-letzte-zeile{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}

.vorfrage{margin-bottom:10px;padding:10px 14px;background:var(--clr-surface);border-radius:var(--radius);font-size:.85rem}
.vorfrage-label{font-weight:600;color:var(--clr-accent-dark);margin-right:8px}
.vorfrage-buttons{display:inline-flex;gap:6px;margin:0 8px}
.vorfrage-btn{padding:4px 12px;font-size:.78rem;border:1px solid var(--clr-border);border-radius:4px;cursor:pointer;background:var(--clr-white);color:var(--clr-text-muted);font-family:inherit;font-weight:600;transition:all var(--transition)}
.vorfrage-btn.active{background:var(--clr-accent-dark);color:var(--clr-white);border-color:var(--clr-accent-dark)}
.vorfrage-extra{margin-top:8px}
.sinnes-buttons{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.sinnes-btn{padding:5px 12px;font-size:.78rem;border:1px solid var(--clr-border);border-radius:var(--radius);cursor:pointer;background:var(--clr-white);color:var(--clr-text-muted);font-family:inherit;font-weight:500;transition:all var(--transition)}
.sinnes-btn.active{background:var(--clr-accent-dark);color:var(--clr-white);border-color:var(--clr-accent-dark)}
.niveau-satz{font-size:.88rem;color:var(--clr-text);margin-bottom:8px;line-height:1.8}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.sichtbar{display:flex}
.modal{background:var(--clr-white);border-radius:calc(var(--radius)*1.5);box-shadow:var(--shadow-md);padding:28px;max-width:400px;width:100%}
.modal h3{font-size:1.05rem;color:var(--clr-accent-dark);margin-bottom:8px;font-weight:700}
.modal p{font-size:.88rem;color:var(--clr-text-muted);margin-bottom:20px;line-height:1.5;white-space:pre-line}
.modal-buttons{display:flex;gap:10px;justify-content:center}

.app-footer{border-top:1px solid var(--clr-border);padding-top:16px;margin-top:8px;font-size:.75rem;color:var(--clr-text-muted);line-height:1.5;text-align:left}
.spacer-20{height:20px}
.export-row{display:flex;gap:12px;justify-content:flex-end;margin:20px 0 12px;flex-wrap:wrap}
.textvorschau-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:1000;align-items:center;justify-content:center;padding:20px}
.textvorschau-overlay.sichtbar{display:flex}
.textvorschau{background:var(--clr-white);border-radius:calc(var(--radius)*1.5);box-shadow:var(--shadow-md);padding:24px;max-width:700px;width:100%;max-height:85vh;display:flex;flex-direction:column}
.textvorschau h3{font-size:1.05rem;color:var(--clr-accent-dark);margin-bottom:12px;font-weight:700}
.textvorschau-text{flex:1;overflow-y:auto;background:var(--clr-surface);border:1px solid var(--clr-border);border-radius:var(--radius);padding:16px;font-size:.82rem;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;line-height:1.6;color:var(--clr-text);white-space:pre-wrap;word-wrap:break-word;min-height:200px}
.textvorschau-buttons{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.kopiert-hinweis{font-size:.78rem;color:var(--clr-success);font-weight:600;align-self:center}
.btn--umwandeln{background:var(--clr-accent-dark);color:var(--clr-white);padding:5px 12px;font-size:.78rem;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;align-self:center;transition:all var(--transition)}
.btn--umwandeln:hover{background:#1a4a72}

/* === MERGE === */
.merge-bar{background:var(--clr-accent-dark);color:var(--clr-white);padding:10px 24px;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:8px;border-radius:var(--radius);margin-bottom:16px}
.merge-bar .merge-x{margin-left:auto;background:none;border:1px solid rgba(255,255,255,.3);color:var(--clr-white);padding:4px 14px;font-size:.78rem;font-weight:600;border-radius:var(--radius);cursor:pointer;font-family:inherit}
.merge-bar .merge-x:hover{background:rgba(255,255,255,.15)}
.quellen-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.quellen-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:14px;font-size:.78rem;font-weight:700}
.keine-infos-hinweis{font-size:.82rem;color:#999;font-style:italic;padding:8px 14px;background:var(--clr-keine-infos-bg);border-radius:var(--radius);margin-bottom:10px}
.sub-label{font-size:.82rem;font-weight:600;color:var(--clr-accent-dark);margin:12px 0 6px;display:flex;align-items:center;gap:4px}
.sub-label .pfeil{color:var(--clr-text-muted)}
.synthese{margin-top:10px;padding:14px;background:var(--clr-surface);border-radius:var(--radius)}
.synthese-label{font-size:.78rem;font-weight:700;color:var(--clr-accent-dark);margin-bottom:6px}
.merge-popup{background:var(--clr-white);border-radius:calc(var(--radius)*1.5);box-shadow:var(--shadow-md);padding:28px;max-width:800px;width:100%;max-height:85vh;overflow-y:auto}
.merge-popup h3{font-size:1.05rem;color:var(--clr-accent-dark);margin-bottom:6px;font-weight:700}
.merge-popup p{font-size:.85rem;color:var(--clr-text-muted);margin-bottom:16px;line-height:1.5}
.dropzone{border:2px dashed var(--clr-border);border-radius:var(--radius);padding:28px;text-align:center;color:var(--clr-text-muted);font-size:.85rem;cursor:pointer;transition:all var(--transition);margin-bottom:16px}
.dropzone:hover,.dropzone.dragover{border-color:var(--clr-accent-light);background:rgba(105,163,210,.06)}
.merge-liste{margin-bottom:16px}
.merge-tabelle{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:16px}
.merge-tabelle th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--clr-border);color:var(--clr-accent-dark);font-weight:700;font-size:.78rem}
.merge-tabelle td{padding:8px 12px;border-bottom:1px solid var(--clr-border);vertical-align:middle}
.merge-tabelle input{padding:5px 10px;font-size:.85rem;font-weight:600;border:1px solid var(--clr-border);border-radius:var(--radius);font-family:inherit;width:100%;color:var(--clr-accent-dark)}
.merge-tabelle input:focus{outline:none;border-color:var(--clr-accent-light);box-shadow:0 0 0 2px rgba(105,163,210,.2)}
.merge-tabelle .btn--entfernen{padding:4px 12px;font-size:.75rem;font-weight:600;border:1px solid var(--clr-danger);border-radius:var(--radius);background:var(--clr-white);color:var(--clr-danger);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all var(--transition)}
.merge-tabelle .btn--entfernen:hover{background:var(--clr-danger);color:var(--clr-white)}
.merge-popup-buttons{display:flex;gap:10px;justify-content:center}

@media(max-width:640px){
  body{padding:12px 8px 60px}
  .abschnitt-header{padding:14px 16px}
  .abschnitt-titel{font-size:1.2rem}
  .bereich-header{padding:10px 12px}
  .bereich-inhalt{padding:0 12px 12px}
  .abschnitt-inhalt{padding:0 16px 16px}
  .feld-row{flex-direction:column}
  .abschnitt-header-rechts{flex-wrap:wrap;gap:8px}
}
</style>
</head>
<body>
<div class="app-container" id="app"></div>
<div class="modal-overlay" id="popup">
  <div class="modal">
    <h3 id="popup-titel"></h3>
    <p id="popup-text"></p>
    <div class="modal-buttons" id="popup-buttons">
      <button class="btn btn--secondary btn--small" id="popup-abbrechen">Abbrechen</button>
      <button class="btn btn--primary btn--small" id="popup-ok">Ok</button>
    </div>
  </div>
</div>
<div class="textvorschau-overlay" id="textvorschau-overlay">
  <div class="textvorschau">
    <h3>Textvorschau</h3>
    <div class="textvorschau-text" id="textvorschau-text"></div>
    <div class="textvorschau-buttons">
      <span class="kopiert-hinweis" id="kopiert-hinweis" style="display:none">Kopiert!</span>
      <button class="btn btn--primary btn--small" id="text-kopieren">Text kopieren</button>
      <button class="btn btn--secondary btn--small" id="textvorschau-schliessen">Schlie&szlig;en</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="merge-overlay">
  <div class="merge-popup">
    <h3>Dateien zusammenf&uuml;hren</h3>
    <p>Importiere die fk3-Dateien deiner Kolleg:innen. Aus den Eingaben wird eine Teamversion erstellt, in der du die Antworten aller zusammenf&uuml;hrst.</p>
    <div class="dropzone" id="merge-dropzone">fk3-Dateien hierher ziehen oder klicken</div>
    <input type="file" id="merge-file-input" multiple accept=".fk3,.json" style="display:none">
    <table class="merge-tabelle" id="merge-liste" style="display:none">
      <thead><tr><th>Datei</th><th>K&uuml;rzel</th><th>Kind</th><th></th></tr></thead>
      <tbody id="merge-tbody"></tbody>
    </table>
    <div class="merge-popup-buttons">
      <button class="btn btn--secondary btn--small" id="merge-abbrechen">Abbrechen</button>
      <button class="btn btn--primary btn--small" id="merge-starten" disabled>Mergen</button>
    </div>
  </div>
</div>
<script>
const STORAGE_KEY='fk3_planungshilfe';
const niveauOptionen=['VSK','Anfang 1','Mitte 1','Ende 1','Anfang 2','Mitte 2','Ende 2','Anfang 3','Mitte 3','Ende 3','Anfang 4','Mitte 4','Ende 4','\u2026'];
let daten=ladeState();
let popupCallback=null;
let nameTimer=null;
const abschliessenFn={};
let mergeModus=false;
let mergeQuellen=[];
let mergeOriginal={};
const MERGE_STORAGE='fk3_merge';
function speichereMerge(){try{localStorage.setItem(MERGE_STORAGE,JSON.stringify({mergeModus,mergeQuellen,mergeOriginal}))}catch(e){}}
function ladeMerge(){try{const s=localStorage.getItem(MERGE_STORAGE);if(s){const m=JSON.parse(s);mergeModus=!!m.mergeModus;mergeQuellen=m.mergeQuellen||[];mergeOriginal=m.mergeOriginal||{}}}catch(e){}}
ladeMerge();

function fortschritt(aid){
  let g=0,f=0,ki=0;
  if(aid==='a1'){g=3;if(hatZeilen(daten.staerken,3))f++;if(hatZeilen(daten.auffaelligkeiten,3))f++;if(hatZeilen(daten.kinderperspektive,3))f++}
  else if(aid==='a2'){const b=['fruehkindlich','kita','viereinhalb','familienleben','allergien','therapien','freizeit'];g=b.length;for(const x of b){const s=daten[x+'_status'];if(s==='fertig')f++;else if(s==='keine-infos')ki++}}
  else if(aid==='a3'){const b=['kognition','sprache','emotionen','sozial','motorik'];g=b.length;for(const x of b){if(daten[x+'_fertig'])f++;else if(mergeModus&&daten[x+'_modus']==='keine-infos')ki++}}
  else if(aid==='a4'){g=3;if(daten.lernstrategien_fertig)f++;else if(mergeModus&&daten.lernstrategien_modus==='keine-infos')ki++;if(daten.deutsch_fertig){if(daten.deutsch_modus==='keine-infos')ki++;else f++}else if(mergeModus&&daten.deutsch_modus==='keine-infos')ki++;if(daten.mathe_fertig){if(daten.mathe_modus==='keine-infos')ki++;else f++}else if(mergeModus&&daten.mathe_modus==='keine-infos')ki++}
  return{g,f,ki};
}

function hatA3Bearbeitet(key){
  const l=daten[key+'_luecken']||{};const hatL=Object.values(l).some(v=>v&&v.trim());
  const ft=(daten[key+'_freitext']||'').trim();const vorl=(freitextVorlagen[key]||'').trim();const alt=(altersTexte[key]||'').trim();
  const ftEigen=ft&&ft!==vorl&&ft!==alt;
  const extras=['_washilft','_anzeichen','_vermeiden'].map(s=>key+s).filter(k=>daten[k]!==undefined);
  const hatE=extras.some(k=>(daten[k]||'').trim());
  return hatL||!!ftEigen||hatE;
}
function istNurAlters(key){return(daten[key+'_freitext']||'').trim()===(altersTexte[key]||'').trim()}
function resetA3(key){
  daten[key+'_luecken']={};daten[key+'_freitext']='';
  for(const k of Object.keys(daten)){if((k.startsWith(key+'_wash')||k.startsWith(key+'_anz')||k.startsWith(key+'_verm'))&&typeof daten[k]==='string')daten[k]=''}
  if(key==='motorik'){daten.motorik_sinne=[];daten.motorik_sinne_text=''}
  if(key==='sprache'){daten.sprache_mehrsprachig=null;daten.sprache_sprachen=''}
}
function hatA4Bearbeitet(key){
  if(key==='lernstrategien'){const l=daten.lernstrategien_luecken||{};const hatL=Object.values(l).some(v=>v&&v.trim());const ft=(daten.lernstrategien_freitext||'').trim();const vorl=(freitextVorlagen.lernstrategien||'').trim();const nae=(daten.lernstrategien_naechster||'').trim();return hatL||(!!ft&&ft!==vorl)||!!nae}
  const df=leerState()[key+'_details'];const detChanged=(daten[key+'_details']||'').trim()!==df.trim();return!!daten[key+'_niveau']||detChanged||(daten[key+'_naechster']||'').trim()!=='';
}

          }else{resetA3(b.key);daten[b.key+'_modus']=mv;if(mv==='altersgemaeß')daten[b.key+'_freitext']=altersTexte[b.key];else if(mv==='freitext')daten[b.key+'_freitext']=freitextVorlagen[b.key]||'';speichereState();render()}
        });tgl.appendChild(btn);
      });
      header.appendChild(tgl);
      if(!modus){bereich.classList.add('eingeklappt');header.addEventListener('click',e=>{if(e.target.closest('.toggle-wrapper'))return;daten[b.key+'_modus']='hilfen';speichereState();render()})}
      else renderA3Inhalt(bi,b.key,modus,b);
    }

  }
  const a3Abschliessen=()=>{
    let unfertig=false;
    for(const b of bereiche){
      if(daten[b.key+'_fertig'])continue;
      if(!daten[b.key+'_modus'])continue;
      if(daten[b.key+'_modus']==='altersgemaeß'){daten[b.key+'_fertig']=true;continue}
      if(!hatA3Bearbeitet(b.key)){resetA3(b.key);daten[b.key+'_modus']=null;continue}
      unfertig=true;
    }
    if(unfertig){zeigePopup('Bereiche fertigstellen',UNFERTIG_TEXT,()=>{},true);return}
    if(!daten.abschnittAbgeschlossen)daten.abschnittAbgeschlossen={};daten.abschnittAbgeschlossen.a3=true;daten.abschnittOffen.a3=false;speichereState();render();
  };
  abschliessenFn.a3=a3Abschliessen;
  const af=document.createElement('div');af.className='abschnitt-footer';
  const afb=document.createElement('button');afb.className='btn btn--fertig';afb.textContent='Abschnitt abschlie\u00dfen';
  afb.addEventListener('click',a3Abschliessen);
  af.appendChild(afb);inh.appendChild(af);return c;
}
function hatExtras(key){return['_washilft','_anzeichen','_vermeiden'].map(s=>key+s).filter(k=>daten[k]!==undefined).some(k=>(daten[k]||'').trim())}

function renderA3Inhalt(bi,key,modus,b){
  if(modus==='hilfen'){
    if(b.vf)bi.appendChild(renderVorfrage());

    bi.appendChild(spacer());
    if(b.sinne){bi.appendChild(renderSinne());bi.appendChild(spacer())}
    for(const wh of WHConfig[key])bi.appendChild(mkTF(wh.l(),wh.k,wh.p));
    const fo=document.createElement('div');fo.className='bereich-footer-buttons';
    const fb=document.createElement('button');fb.className='btn btn--fertig';fb.textContent='Fertig';fb.dataset.a3Fertig=key;fb.disabled=!hatA3Bearbeitet(key);
    fb.addEventListener('click',()=>{const sp=ltZuSP(key);daten[key+'_freitext']=sp||freitextVorlagen[key]||'';daten[key+'_modus']='freitext';daten[key+'_fertig']=true;speichereState();render()});
    fo.appendChild(fb);fo.appendChild(mkZurueck(key));bi.appendChild(fo);
  }else if(modus==='freitext'){
    if(b.vf)bi.appendChild(renderVorfrage());

    bi.appendChild(mkTF(null,key+'_freitext',''));
    if(b.sinne){bi.appendChild(renderSinne());bi.appendChild(spacer())}
    for(const wh of WHConfig[key])bi.appendChild(mkTF(wh.l(),wh.k,wh.p));
    const fo=document.createElement('div');fo.className='bereich-footer-buttons';
    const fb=document.createElement('button');fb.className='btn btn--fertig';fb.textContent='Fertig';fb.dataset.a3Fertig=key;fb.disabled=!hatA3Bearbeitet(key);
    fb.addEventListener('click',()=>{daten[key+'_fertig']=true;speichereState();render()});
    fo.appendChild(fb);fo.appendChild(mkZurueck(key));bi.appendChild(fo);
  }else if(modus==='altersgemaeß'){
    if(!(daten[key+'_freitext']||'').trim())daten[key+'_freitext']=altersTexte[key];
    bi.appendChild(mkTF(null,key+'_freitext',''));
    const fo=document.createElement('div');fo.className='bereich-footer-buttons';
    const fb=document.createElement('button');fb.className='btn btn--fertig';fb.textContent='Fertig';
    fb.addEventListener('click',()=>{daten[key+'_fertig']=true;speichereState();render()});

    zb.addEventListener('click',()=>{
      if(istNurAlters(key)&&!hatExtras(key)){resetA3(key);daten[key+'_modus']=null;daten[key+'_fertig']=false;speichereState();render()}
      else zeigePopup('Eingaben l\u00f6schen?','Achtung, die Eingaben gehen verloren.',()=>{resetA3(key);daten[key+'_modus']=null;daten[key+'_fertig']=false;speichereState();render()})
    });
    fo.appendChild(fb);fo.appendChild(zb);bi.appendChild(fo);
  }

let mergeDateien=[];

function hatInhalt(){return !!(daten.kindName||daten.meinName||daten.staerken||daten.auffaelligkeiten)}

function zeigeMergePopup(){
  if(hatInhalt()){

function oeffneMergeDialog(){
  mergeDateien=[];aktualisiereMergeTabelle();
  document.getElementById('merge-overlay').classList.add('sichtbar');
}
document.getElementById('merge-abbrechen').addEventListener('click',()=>{document.getElementById('merge-overlay').classList.remove('sichtbar')});
document.getElementById('merge-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('merge-overlay').classList.remove('sichtbar')});

// Dropzone
const dz=document.getElementById('merge-dropzone');const mfi=document.getElementById('merge-file-input');
dz.addEventListener('click',()=>mfi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');leseMergeDateien(e.dataTransfer.files)});
mfi.addEventListener('change',e=>{leseMergeDateien(e.target.files);mfi.value=''});

function leseMergeDateien(files){
  for(const f of files){
    const r=new FileReader();
    r.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);mergeDateien.push({dateiname:f.name,kuerzel:d.meinName||'??',kindName:d.kindName||'',daten:d});aktualisiereMergeTabelle()}catch(e){alert('Datei konnte nicht gelesen werden: '+f.name)}
    };r.readAsText(f);
  }
}
function aktualisiereMergeTabelle(){
  const tbl=document.getElementById('merge-liste');const tbody=document.getElementById('merge-tbody');
  tbody.innerHTML='';
  if(!mergeDateien.length){tbl.style.display='none';document.getElementById('merge-starten').disabled=true;return}
  tbl.style.display='';document.getElementById('merge-starten').disabled=mergeDateien.length<2;
  mergeDateien.forEach((md,i)=>{
    const tr=document.createElement('tr');
    const td1=document.createElement('td');td1.textContent=md.dateiname;tr.appendChild(td1);
    const td2=document.createElement('td');
    const inp=document.createElement('input');inp.value=md.kuerzel;
    inp.addEventListener('input',e=>{mergeDateien[i].kuerzel=e.target.value});
    td2.appendChild(inp);tr.appendChild(td2);
    const td3=document.createElement('td');td3.textContent=md.kindName||'';tr.appendChild(td3);
    const td4=document.createElement('td');td4.style.textAlign='right';
    const btn=document.createElement('button');btn.className='btn--entfernen';btn.textContent='Entfernen';
    btn.addEventListener('click',()=>{mergeDateien.splice(i,1);aktualisiereMergeTabelle()});
    td4.appendChild(btn);tr.appendChild(td4);
    tbody.appendChild(tr);
  });
}

document.getElementById('merge-starten').addEventListener('click',()=>{
  document.getElementById('merge-overlay').classList.remove('sichtbar');
  if(window.goatcounter)goatcounter.count({path:'fk3-merge-gestartet',event:true});
  mergeQuellen=mergeDateien.map((md,i)=>({kuerzel:md.kuerzel,daten:Object.assign(leerState(),md.daten),farbe:MERGE_FARBEN[i%7],bg:MERGE_BG[i%7],text:MERGE_TEXT[i%7]}));
  daten=leerState();
  daten.kindName=mergeQuellen[0].daten.kindName||'';
  daten.meinName='Team';daten.datum=heutigesDatum();
  mergeFillAll();
  mergeModus=true;speichereMerge();speichereState();render();
});

function mergeFillAll(){
  // A1
  daten.staerken=mergeTextFeld('staerken');
  daten.auffaelligkeiten=mergeTextFeld('auffaelligkeiten');
  daten.kinderperspektive=mergeTextFeld('kinderperspektive');
  // A2
  for(const k of ['fruehkindlich','kita','viereinhalb','familienleben','allergien','therapien','freizeit']){
    daten[k]=mergeTextFeld(k);daten[k+'_status']=daten[k].trim()?'bearbeiten':null;
  }
  // A3
  for(const k of ['kognition','sprache','emotionen','sozial','motorik']){
    for(const q of mergeQuellen){if(q.daten[k+'_modus']==='hilfen'){const lt=ltZuSPMerge(k,q.daten);if(lt)q.daten[k+'_freitext']=lt;q.daten[k+'_modus']='freitext'}}
    daten[k+'_freitext']=mergeTextFeld(k+'_freitext');
    daten[k+'_modus']=daten[k+'_freitext'].trim()?'freitext':null;
    const whKeys=(WHConfig[k]||[]).map(w=>w.k);
    for(const wk of whKeys)daten[wk]=mergeTextFeld(wk);
    if(k==='sprache'){
      // Mehrsprachigkeit als Text integrieren
      const mInfos=[];
      for(const q of mergeQuellen){
        if(q.daten.sprache_mehrsprachig==='Ja'){let t='Ja';if((q.daten.sprache_sprachen||'').trim())t+=' \u2013 '+q.daten.sprache_sprachen.trim();mInfos.push(t+' ('+q.kuerzel+')')}
        else if(q.daten.sprache_mehrsprachig==='Nein'){let t='Nein';if((q.daten.sprache_sprachen||'').trim())t+=' \u2013 '+q.daten.sprache_sprachen.trim();mInfos.push(t+' ('+q.kuerzel+')')}
      }
      if(mInfos.length){const mText='Mehrsprachigkeit: '+mInfos.join(', ');daten[k+'_freitext']=mText+'\n\n'+daten[k+'_freitext']}
    }
    if(k==='motorik'){
      const allSinne=[];for(const q of mergeQuellen)for(const s of(q.daten.motorik_sinne||[]))if(!allSinne.includes(s))allSinne.push(s);
      daten.motorik_sinne=allSinne;daten.motorik_sinne_text=mergeTextFeld('motorik_sinne_text');
    }
  }
  // A4
  daten.lernstrategien_freitext=mergeTextFeld('lernstrategien_freitext');
  daten.lernstrategien_naechster=mergeTextFeld('lernstrategien_naechster');
  daten.lernstrategien_modus=daten.lernstrategien_freitext.trim()?'freitext':null;
  for(const k of ['deutsch','mathe']){
    const niveaus=[];
    for(const q of mergeQuellen){const nv=q.daten[k+'_niveau'];if(nv)niveaus.push(nv+' ('+q.kuerzel+')')}
    const nivText=niveaus.length?'Niveaueinsch\u00e4tzungen: '+niveaus.join(', '):'';
    let details=mergeTextFeld(k+'_details');
    if(nivText&&details)details=nivText+'\n\n'+details;else if(nivText)details=nivText;
    daten[k+'_details']=details;
    daten[k+'_naechster']=mergeTextFeld(k+'_naechster');
    daten[k+'_niveau']='';
    daten[k+'_modus']=details.trim()?'bearbeiten':null;
  }
  // Originale speichern f\u00fcr Zur\u00fccksetzen
  mergeOriginal={};
  const keys=['staerken','auffaelligkeiten','kinderperspektive',
    'fruehkindlich','kita','viereinhalb','familienleben','allergien','therapien','freizeit',
    'kognition_freitext','kognition_washilft','sprache_freitext','sprache_washilft',
    'emotionen_freitext','emotionen_anzeichen','emotionen_washilft','emotionen_vermeiden',
    'sozial_freitext','sozial_washilft','motorik_freitext','motorik_washilft','motorik_sinne_text',
    'lernstrategien_freitext','lernstrategien_naechster',
    'deutsch_details','deutsch_naechster','mathe_details','mathe_naechster'];
  for(const k of keys)mergeOriginal[k]=daten[k]||'';
  mergeOriginal.motorik_sinne=[...(daten.motorik_sinne||[])];
}

function ltZuSPMerge(key,qDaten){
  const s=LT()[key];if(!s)return'';const l=qDaten[key+'_luecken']||{};const r=[];
  for(const z of s){let g=false,t='',d=0;for(const p of z.t){if(typeof p==='string')t+=p;else{const k=z.id+'_'+d,w=l[k];if(w&&w.trim()){g=true;t+=w}else t+='[\u2026]';d++}}if(g)r.push('- '+t.trim())}
  return r.join('\n');
}

function mergeTextFeld(key){
  const texte=[];const zeilen={};
  for(const q of mergeQuellen){
    let t=(q.daten[key]||'').trim();
    // Skip default templates
    if(key.endsWith('_details')){const fach=key.replace('_details','');const df=(leerState()[key]||'').trim();if(t===df)t=''}
    if(key.endsWith('_freitext')){const bk=key.replace('_freitext','');const vorl=(freitextVorlagen[bk]||'').trim();const alt=(altersTexte[bk]||'').trim();if(t===vorl)t=''}
    if(t)texte.push({kuerzel:q.kuerzel,text:t});
  }
  if(!texte.length)return'';
  if(texte.length===1)return'(von '+texte[0].kuerzel+')\n'+texte[0].text;
  // Duplikat-Erkennung
  const allLines={};const dupes=[];
  for(const te of texte){const lines=te.text.split('\n').map(l=>l.trim()).filter(l=>l);for(const l of lines){if(!allLines[l])allLines[l]=[];allLines[l].push(te.kuerzel)}}
  const dupeLines=[];const dupeSet=new Set();
  for(const[line,ks]of Object.entries(allLines)){if(ks.length>1){dupeLines.push('- '+line.replace(/^- /,'')+' ('+[...new Set(ks)].join(', ')+')');dupeSet.add(line)}}
  const result=[];
  if(dupeLines.length){result.push('(Doppelnennung)');result.push(...dupeLines);result.push('')}
  for(const te of texte){
    const eigenLines=te.text.split('\n').map(l=>l.trim()).filter(l=>l&&!dupeSet.has(l));
    if(eigenLines.length){result.push('(von '+te.kuerzel+')');result.push(eigenLines.join('\n'));result.push('')}
  }
  return result.join('\n').trim();
}

function mergeKeineInfos(key){
  const ohne=[];
  for(const q of mergeQuellen){
    let hatContent=false;
    if(key==='staerken'||key==='auffaelligkeiten'||key==='kinderperspektive')hatContent=!!(q.daten[key]||'').trim();
    else if(['fruehkindlich','kita','viereinhalb','familienleben','allergien','therapien','freizeit'].includes(key)){
      hatContent=(q.daten[key+'_status']==='fertig'&&(q.daten[key]||'').trim())}
    else if(['kognition','sprache','emotionen','sozial','motorik'].includes(key))hatContent=!!q.daten[key+'_fertig'];
    else if(key==='lernstrategien')hatContent=!!q.daten.lernstrategien_fertig;
    else if(key==='deutsch'||key==='mathe')hatContent=!!(q.daten[key+'_fertig']&&q.daten[key+'_modus']!=='keine-infos');
    if(!hatContent)ohne.push(q.kuerzel);
  }
  return ohne;
}

function mkMergeCard(titel,keineInfosKey,felder,statusFn,onFertig,onKeineInfos,onReset,onReopen){
  const status=statusFn();
  const be=mkBereich(titel);const header=be.querySelector('.bereich-header');const bi=be.querySelector('.bereich-inhalt');
  if(status==='fertig'){
    be.classList.add('fertig-bg','eingeklappt');
    const badge=document.createElement('button');badge.className='btn--fertig-badge';badge.textContent='Fertig';
    be.addEventListener('mouseenter',()=>{badge.textContent='Bearbeiten'});be.addEventListener('mouseleave',()=>{badge.textContent='Fertig'});
    badge.addEventListener('click',e=>{e.stopPropagation();onReopen()});
    header.appendChild(badge);header.addEventListener('click',e=>{if(e.target.closest('button'))return;onReopen()});
  }else if(status==='keine-infos'){
    be.classList.add('keine-infos-bg','eingeklappt');
    const badge=document.createElement('button');badge.className='btn--keine-infos-badge';badge.textContent='Keine Infos';
    be.addEventListener('mouseenter',()=>{badge.textContent='Bearbeiten'});be.addEventListener('mouseleave',()=>{badge.textContent='Keine Infos'});
    badge.addEventListener('click',e=>{e.stopPropagation();onReset()});
    header.appendChild(badge);header.addEventListener('click',e=>{if(e.target.closest('button'))return;onReset()});
  }else{
    const ohne=mergeKeineInfos(keineInfosKey);
    if(ohne.length)bi.appendChild(mkKeineInfosHinweis(ohne));
    for(const f of felder){
      if(f.label){const sl=document.createElement('div');sl.className='sub-label';sl.innerHTML='<span class="pfeil">\u25b8</span> '+f.label.replace(/^\u25b8 /,'');bi.appendChild(sl)}
      bi.appendChild(mkMergeTF(null,f.key));
    }
    const fo=document.createElement('div');fo.className='bereich-footer-buttons';
    const fb=document.createElement('button');fb.className='btn btn--fertig';fb.textContent='Fertig';fb.addEventListener('click',onFertig);
    const kb=document.createElement('button');kb.className='btn btn--keine-infos';kb.textContent='Keine Infos';kb.addEventListener('click',onKeineInfos);
    const rb=document.createElement('button');rb.className='btn btn--danger-outline';rb.textContent='Zur\u00fccksetzen';rb.addEventListener('click',onReset);
    fo.appendChild(fb);fo.appendChild(kb);fo.appendChild(rb);bi.appendChild(fo);
  }
  return be;
}

function validiereExport(){
  if(!mergeModus){
    if(!(daten.kindName||'').trim()){zeigePopup('Name fehlt','Bitte trage den Namen des Kindes ein, bevor du exportierst.',()=>{},true);return false}
    if(!(daten.meinName||'').trim()){zeigePopup('K\u00fcrzel fehlt','Bitte trage dein K\u00fcrzel ein, bevor du exportierst.',()=>{},true);return false}
  }
  if(!daten.abschnittAbgeschlossen)daten.abschnittAbgeschlossen={};
  if(!daten.abschnittBesucht)daten.abschnittBesucht={};
  // Nie geöffnete Abschnitte gelten automatisch als abgeschlossen
  for(const aid of ['a1','a2','a3','a4'])if(!daten.abschnittBesucht[aid])daten.abschnittAbgeschlossen[aid]=true;
  // Alle Badges sichtbar machen
  let mussteRendern=false;
  for(const aid of ['a1','a2','a3','a4'])if(!daten.abschnittBesucht[aid]){daten.abschnittBesucht[aid]=true;mussteRendern=true}
  if(mussteRendern){speichereState();render()}
  const namen={a1:'Abschnitt 1',a2:'Abschnitt 2',a3:'Abschnitt 3',a4:'Abschnitt 4'};
  const fehlend=[];
  for(const aid of ['a1','a2','a3','a4'])if(!daten.abschnittAbgeschlossen[aid])fehlend.push(namen[aid]);
  if(fehlend.length){
    zeigePopup('Abschnitte nicht abgeschlossen','Bitte schlie\u00dfe alle Abschnitte ab. Klicke auf \u201eAbschnitt abschlie\u00dfen\u201c bei:\n\u2022 '+fehlend.join('\n\u2022 '),()=>{},true);return false;
  }
  return true;
}
function zaehlZeilen(text){if(!text)return 0;return text.split('\n').filter(z=>z.trim()).length}
function zaehlWoerter(text){if(!text||!text.trim())return 0;return text.trim().split(/\s+/).filter(w=>w).length}
function mkStichpunktBadge(key){
  const t=daten[key]||'';const z=zaehlZeilen(t);const w=zaehlWoerter(t);
  if(z<1&&w<1)return null;
  const sp=document.createElement('span');sp.dataset.stichpunkt=key;
  if(w>25){sp.className='stichpunkt-badge gruen';sp.textContent=w+' W\u00f6rter'}
  else{sp.className='stichpunkt-badge '+(z>=3?'gruen':'grau');sp.textContent=z+(z===1?' Stichpunkt':' Stichpunkte')}
  return sp;
}

function bereiteExportDaten(){
  // Convert remaining hilfen to freitext
  for(const key of ['kognition','sprache','emotionen','sozial','motorik','lernstrategien']){
    const mk=key+'_modus';if(daten[mk]==='hilfen'){const st=ltZuSP(key);if(st){daten[key+'_freitext']=st;daten[mk]='freitext'}}}
  speichereState();
}

function exportFn(){
  if(!validiereExport())return;
  bereiteExportDaten();
  if(window.goatcounter)goatcounter.count({path:mergeModus?'fk3-team-gespeichert':'fk3-gespeichert',event:true});
  const blob=new Blob([JSON.stringify(daten,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  const suffix=mergeModus?'-Teamversion':'';
  a.download='Planungshilfe_'+(daten.kindName||'Planungshilfe').replace(/\s+/g,'_')+'_'+(daten.datum||heutigesDatum())+suffix+'.fk3';
  a.click();URL.revokeObjectURL(url);
}

function generiereText(){
  bereiteExportDaten();
  const n=N(),z=[];
  const linie='\u2500'.repeat(36);
  z.push('fk3 P\u00e4dagogische Planungshilfe');
  z.push('Kind: '+n);
  z.push('Ausgef\u00fcllt von: '+(daten.meinName||''));
  z.push('Datum: '+(daten.datum||''));
  z.push('');

  // A1
  const a1z=[];
  const st=(daten.staerken||'').trim();if(st){a1z.push('ST\u00c4RKEN / RESSOURCEN');a1z.push(st);a1z.push('');a1z.push('')}
  const au=(daten.auffaelligkeiten||'').trim();if(au){a1z.push('AUFF\u00c4LLIGKEITEN / UNTERST\u00dcTZUNGSBEDARF');a1z.push(au);a1z.push('');a1z.push('')}
  const kp=(daten.kinderperspektive||'').trim();if(kp){a1z.push('KINDERPERSPEKTIVE');a1z.push(kp);a1z.push('');a1z.push('')}
  if(a1z.length){z.push(linie);z.push('1. \u00dcberblick zum aktuellen Stand');z.push(linie);z.push('');z.push(...a1z)}

  // A2
  const a2b=[
    {key:'fruehkindlich',label:'FR\u00dcHKINDLICHE ENTWICKLUNG'},
    {key:'kita',label:'KITA-ZEIT'},
    {key:'viereinhalb',label:'4\u00bd-J\u00c4HRIGEN / BERICHT DES S\u00c4D'},
    {key:'familienleben',label:'FAMILIENLEBEN'},
    {key:'allergien',label:'ALLERGIEN / MEDIKAMENTE / MEDIZINISCHE DIAGNOSEN'},
    {key:'therapien',label:'THERAPIEN'},
    {key:'freizeit',label:'FREIZEITAKTIVIT\u00c4TEN'}
  ];
  const a2z=[];
  for(const b of a2b){
    const s=daten[b.key+'_status'],t=(daten[b.key]||'').trim();
    if(s==='fertig'&&t){a2z.push(b.label);a2z.push(t);a2z.push('');a2z.push('')}
  }
  if(a2z.length){z.push(linie);z.push('2. Lebenswelt & Hintergr\u00fcnde');z.push(linie);z.push('');z.push(...a2z)}

  // A3
  const a3b=[
    {key:'kognition',titel:'KOGNITION, KONZENTRATION UND AUSDAUER'},
    {key:'sprache',titel:'SPRACHE / KOMMUNIKATION'},
    {key:'emotionen',titel:'EMOTIONEN / VERHALTEN'},
    {key:'sozial',titel:'SOZIALE INTERAKTION'},
    {key:'motorik',titel:'MOTORIK / WAHRNEHMUNG'}
  ];
  const a3z=[];
  for(const b of a3b){
    if(!daten[b.key+'_fertig'])continue;
    const ft=(daten[b.key+'_freitext']||'').trim();
    if(!ft)continue;
    a3z.push(b.titel);
    if(b.key==='sprache'&&daten.sprache_mehrsprachig){
      let ms='Mehrsprachigkeit: '+daten.sprache_mehrsprachig;
      if((daten.sprache_sprachen||'').trim())ms+=' \u2013 '+daten.sprache_sprachen.trim();
      a3z.push(ms);
    }
    a3z.push(ft);
    if(b.key==='motorik'&&(daten.motorik_sinne||[]).length>0){
      a3z.push('');a3z.push('Auff\u00e4lligkeiten bei: '+daten.motorik_sinne.join(', '));
      if((daten.motorik_sinne_text||'').trim())a3z.push(daten.motorik_sinne_text.trim());
    }
    const whc=WHConfig[b.key]||[];
    for(const wh of whc){const t=(daten[wh.k]||'').trim();if(t){a3z.push('');a3z.push('\u25b8 '+wh.l());a3z.push(t)}}
    a3z.push('');a3z.push('');
  }
  if(a3z.length){z.push(linie);z.push('3. Entwicklungsbereiche');z.push(linie);z.push('');z.push(...a3z)}

  // A4
  const a4z=[];
  if(daten.lernstrategien_fertig){
    const ft=(daten.lernstrategien_freitext||'').trim();
    if(ft){
      a4z.push('LERNSTRATEGIEN');a4z.push(ft);
      if((daten.lernstrategien_naechster||'').trim()){a4z.push('');a4z.push('\u25b8 N\u00e4chster Schritt');a4z.push(daten.lernstrategien_naechster.trim())}
      a4z.push('');a4z.push('');
    }
  }
  for(const fach of [{key:'deutsch',titel:'DEUTSCH'},{key:'mathe',titel:'MATHE'}]){
    if(!daten[fach.key+'_fertig']||daten[fach.key+'_modus']==='keine-infos')continue;
    const det=(daten[fach.key+'_details']||'').trim();const niv=daten[fach.key+'_niveau'];
    if(!det&&!niv)continue;
    a4z.push(fach.titel+(niv?' (Niveau: '+niv+')':''));
    if(det)a4z.push(det);
    if((daten[fach.key+'_naechster']||'').trim()){a4z.push('');a4z.push('\u25b8 N\u00e4chster Lernschritt');a4z.push(daten[fach.key+'_naechster'].trim())}
    a4z.push('');a4z.push('');
  }
  if(a4z.length){z.push(linie);z.push('4. Lernen & fachliche Kompetenzen');z.push(linie);z.push('');z.push(...a4z)}

  return z.join('\n').replace(/\n{4,}/g,'\n\n\n').trim();
}

function textVorschau(){
  if(!validiereExport())return;
  const text=generiereText();
  document.getElementById('textvorschau-text').textContent=text;
  document.getElementById('kopiert-hinweis').style.display='none';
  document.getElementById('textvorschau-overlay').classList.add('sichtbar');
}
document.getElementById('text-kopieren').addEventListener('click',()=>{
  const text=document.getElementById('textvorschau-text').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const h=document.getElementById('kopiert-hinweis');h.style.display='';setTimeout(()=>h.style.display='none',2000);
  });
});
document.getElementById('textvorschau-schliessen').addEventListener('click',()=>{
  document.getElementById('textvorschau-overlay').classList.remove('sichtbar');
});
document.getElementById('textvorschau-overlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget)document.getElementById('textvorschau-overlay').classList.remove('sichtbar');
});
function importFn(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.fk3,.json';
  inp.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{daten=Object.assign(leerState(),JSON.parse(ev.target.result));speichereState();render()}catch(err){alert('Die Datei konnte nicht gelesen werden.')}};r.readAsText(f)});
  inp.click();
}
render();
